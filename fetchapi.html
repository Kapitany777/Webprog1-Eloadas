<article>
    <h2>Fetch API – Filmadatbázis (Lapozható)</h2>
    
    <table>
        <thead>
            <tr id="tabla-fejlec"></tr>
        </thead>
        <tbody id="film-tabla-test"></tbody>
    </table>

    <div id="lapozo-kontener" class="btn-container"></div>
</article>

<script>



async function inicializalas() {
    try {
        // Mostantól a PHP-t hívjuk meg!
        const valasz = await fetch('api.php');
        filmAdatok = await valasz.json();

        // Mivel az adatbázisból jönnek a mezőnevek, kinyerjük őket
        if (filmAdatok.length > 0) {
            fejlecNevek = Object.keys(filmAdatok[0]);
        }

        tablaFrissites();
    } catch (hiba) {
        console.error("Hiba az adatok beolvasásakor:", hiba);
    }
}


let filmAdatok = [];
let fejlecNevek = [];
let aktualisOldal = 1;
const sorOldalankent = 10;

async function inicializalas() {
    try {
        const valasz = await fetch('film.txt');
        const buffer = await valasz.arrayBuffer();
        
        // Windows-1250 dekódolás az ékezetek miatt
        const decoder = new TextDecoder('windows-1250');
        const nyersSzoveg = decoder.decode(buffer);

        const sorok = nyersSzoveg.trim().split('\n');
        fejlecNevek = sorok[0].split('\t').map(h => h.trim());

        filmAdatok = sorok.slice(1).map(sor => {
            const cellak = sor.split('\t');
            let obj = {};
            fejlecNevek.forEach((nev, i) => obj[nev] = cellak[i] ? cellak[i].trim() : "");
            return obj;
        });

        tablaFrissites();
    } catch (hiba) {
        console.error("Hiba:", hiba);
    }
}

function tablaFrissites() {
    const tablaTest = document.getElementById('film-tabla-test');
    const fejlecSor = document.getElementById('tabla-fejlec');
    
    const start = (aktualisOldal - 1) * sorOldalankent;
    const end = start + sorOldalankent;
    const aktualisSzelet = filmAdatok.slice(start, end);

    // Fejléc
    fejlecSor.innerHTML = fejlecNevek.map(h => `<th>${h}</th>`).join('') + "<th>Műveletek</th>";
    
    // Sorok
    tablaTest.innerHTML = aktualisSzelet.map((film, index) => {
        const eredetiIndex = start + index;
        return `
        <tr>
            ${fejlecNevek.map(h => `<td>${film[h]}</td>`).join('')}
            <td>
                <button class="btn-edit" onclick="szerkesztes(${eredetiIndex})">Szerkeszt</button>
                <button class="btn-delete" onclick="torles(${eredetiIndex})">Töröl</button>
            </td>
        </tr>`;
    }).join('');

    vezerlokFrissitese();
}

function vezerlokFrissitese() {
    const lapozo = document.getElementById('lapozo-kontener');
    const osszesOldal = Math.ceil(filmAdatok.length / sorOldalankent);
    
    lapozo.innerHTML = `
        <button onclick="oldalValtas(-1)" ${aktualisOldal === 1 ? 'disabled' : ''}>Előző</button>
        <span> ${aktualisOldal} / ${osszesOldal} </span>
        <button onclick="oldalValtas(1)" ${aktualisOldal === osszesOldal ? 'disabled' : ''}>Következő</button>
    `;
}

function oldalValtas(irany) {
    aktualisOldal += irany;
    tablaFrissites();
}

function torles(index) {
    if (confirm("Biztosan törlöd?")) {
        filmAdatok.splice(index, 1);
        // Ha az utolsó elemet töröltük az oldalon, ugorjunk vissza
        if ((aktualisOldal - 1) * sorOldalankent >= filmAdatok.length && aktualisOldal > 1) {
            aktualisOldal--;
        }
        tablaFrissites();
    }
}

function szerkesztes(index) {
    const ujCim = prompt("Új filmcím:", filmAdatok[index].filmcim);
    if (ujCim) {
        filmAdatok[index].filmcim = ujCim;
        tablaFrissites();
    }
}

window.onload = inicializalas;
</script>
