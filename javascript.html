<div id="content">
    <h2>Javascript menü</h2>

    <div class="cinemas-form">
        <form onsubmit="event.preventDefault(); onFormSubmit();">
			<div>
				<label>Név*</label><label class="validation-error hide" id="nameValidationError">Kötelezően kitöltendő mező</label>
				<input type="text" name="mozinev" id="mozinev">
			</div>
			<div>
				<label>Irányítószám</label>
				<input type="text" name="irszam" id="irszam" maxlength="4">
			</div>
			<div>
				<label>Cím</label>
				<input type="text" name="cim" id="cim">
			</div>
			<div>
				<label>Telefon</label>
				<input type="text" name="telefon" id="telefon">
			</div>
			<div class="form-action-buttons">
				<input type="submit" value="Rögzítés">
			</div>
		</form>
    </div>

    <div class="cinemas-list">
        <table id="cinemalist" class="cinemas-table">
            <thead>
                <tr>
                    <th>Név</th>
                    <th>Irányítószám</th>
                    <th>Cím</th>
                    <th>Telefon</th>
                    <th>Művelet</th>
                </tr>
            </thead>

            <tbody></tbody>
        </table>
    </div>
