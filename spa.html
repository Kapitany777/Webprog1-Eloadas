<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPA – Mini React Appok</title>
    <link rel="stylesheet" type="text/css" href="styles/main.css">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
    
        article {
            padding: 20px;
        }
        .box-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .box {
            background: white;
            padding: 25px;
            border-radius: 8px;
            width: 320px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }
        .box h3 {
            color: #2196F3;
            margin-top: 0;
        }
        input {
            width: 80%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn-group {
            margin: 10px 0;
        }
        button {
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid #2196F3;
            background: white;
            color: #2196F3;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background: #2196F3;
            color: white;
        }
        .result-display {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-top: 15px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 4px;
            text-align: center;
        }
    </style>
</head>
    
 

<body>

<header>
    <img src="images/logo.png" alt="Logo">
    <h1>Web programozás-1 Előadás Házi feladat</h1>
</header>

<nav>
    <ul>
        <li><a href="index.html">Főoldal menü</a></li>
        <li><a href="javascript.html">Javascript menü</a></li>
        <li><a href="react.html">React menü</a></li>
        <li><a href="spa.html">SPA menü</a></li>
        <li><a href="fetchapi.html">Fetch API menü</a></li>
        <li><a href="axios.html">Axios menü</a></li>
        <li><a href="oojs.html">OOJS menü</a></li>
        <li><a href="kapcsolat.html">Kapcsolat menü</a></li>
    </ul>
</nav>



<div id="root"></div>

<script type="text/babel">
    function Calculator() {
        const [a, setA] = React.useState(0);
        const [b, setB] = React.useState(0);
        const [result, setResult] = React.useState(null);

        return (
            <div className="box">
                <h3>1. Számológép</h3>
                <input type="number" value={a} onChange={e => setA(Number(e.target.value))} style={{width: '90%', padding: '8px', marginBottom: '10px'}} />
                <input type="number" value={b} onChange={e => setB(Number(e.target.value))} style={{width: '90%', padding: '8px', marginBottom: '10px'}} />
                <div>
                    <button onClick={() => setResult(a + b)}>+</button>
                    <button onClick={() => setResult(a - b)}>-</button>
                    <button onClick={() => setResult(a * b)}>*</button>
                    <button onClick={() => setResult(b !== 0 ? (a / b).toFixed(2) : "Hiba")}>/</button>
                </div>
                <div style={{marginTop: '15px', fontWeight: 'bold', fontSize: '1.2em'}}>Eredmény: {result !== null ? result : "-"}</div>
            </div>
        );
    }

    function ColorChanger() {
        const [color, setColor] = React.useState("white");
        const [history, setHistory] = React.useState([]);

        const changeColor = (newColor) => {
            setColor(newColor);
            if (newColor !== "white") setHistory(prev => [newColor, ...prev].slice(0, 3));
        };

        return (
            <div className="box" style={{ background: color, transition: '0.4s' }}>
                <h3>2. Színváltó</h3>
                <p>Válassz színt:</p>
                <button onClick={() => changeColor("#bbdefb")}>Kék</button>
                <button onClick={() => changeColor("#c8e6c9")}>Zöld</button>
                <button onClick={() => changeColor("#ffcdd2")}>Piros</button>
                <button onClick={() => changeColor("white")}>Alap</button>
                <p style={{fontSize: '0.8em', marginTop: '10px'}}>Előzmények: {history.join(", ")}</p>
            </div>
        );
    }

    function App() {
        const [view, setView] = React.useState('calc');

        return (
            <article>
                <div className="nav-buttons">
                    <button className={view === 'calc' ? 'active-btn' : ''} onClick={() => setView('calc')}>Számológép</button>
                    <button className={view === 'color' ? 'active-btn' : ''} onClick={() => setView('color')}>Színváltó</button>
                </div>
                <div className="box-container">
                    {view === 'calc' ? <Calculator /> : <ColorChanger />}
                </div>
            </article>
        );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<footer style={{textAlign: 'center', padding: '20px'}}>
    <p>Készítette: Bencze Szabolcs & Török Viktor</p>
</footer>

</body>
</html>
