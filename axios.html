<article>
    <h2>Axios API – Budapesti Mozik (mozi.txt)</h2>
    
    <table>
        <thead>
            <tr id="tabla-fejlec"></tr>
        </thead>
        <tbody id="mozi-tabla-test"></tbody>
    </table>

    <div id="lapozo-kontener" class="btn-container"></div>
</article>

  <script>


let moziAdatok = [];
let fejlecNevek = [];
let aktualisOldal = 1;
const sorOldalankent = 10;

async function moziBetoltes() {
    try {
        // Axios hívás arraybuffer-rel az ékezetek miatt
        const valasz = await axios.get('mozi.txt', { responseType: 'arraybuffer' });
        
        const decoder = new TextDecoder('windows-1250');
        const nyersSzoveg = decoder.decode(valasz.data);

        const sorok = nyersSzoveg.trim().split('\n').map(s => s.replace('\r', ''));
        fejlecNevek = sorok[0].split('\t').map(h => h.trim());

        // Adatok objektummá alakítása
        moziAdatok = sorok.slice(1).map((sor, index) => {
            const cellak = sor.split('\t');
            let obj = { id: index }; // Egyedi ID a műveletekhez
            fejlecNevek.forEach((nev, i) => {
                obj[nev] = cellak[i] ? cellak[i].trim() : "";
            });
            return obj;
        });

        tablaFrissites();
    } catch (hiba) {
        console.error("Axios hiba:", hiba);
    }
}

function tablaFrissites() {
    const tablaTest = document.getElementById('mozi-tabla-test');
    const fejlecSor = document.getElementById('tabla-fejlec');
    
    const start = (aktualisOldal - 1) * sorOldalankent;
    const end = start + sorOldalankent;
    const szelet = moziAdatok.slice(start, end);

    fejlecSor.innerHTML = fejlecNevek.map(h => `<th>${h}</th>`).join('') + "<th>Műveletek</th>";
    
    tablaTest.innerHTML = szelet.map((mozi) => `
        <tr>
            ${fejlecNevek.map(h => `<td>${mozi[h]}</td>`).join('')}
            <td>
                <button class="btn-edit" onclick="moziModositas(${mozi.id})">Szerkeszt</button>
                <button class="btn-delete" onclick="moziTorles(${mozi.id})">Töröl</button>
            </td>
        </tr>`).join('');

    vezerlokFrissitese();
}

// --- CRUD MŰVELETEK ---

function moziTorles(id) {
    if (confirm("Biztosan törlöd ezt a mozit?")) {
        moziAdatok = moziAdatok.filter(m => m.id !== id);
        // Ha kiürül az oldal, ugorjunk vissza
        const osszesOldal = Math.ceil(moziAdatok.length / sorOldalankent);
        if (aktualisOldal > osszesOldal && aktualisOldal > 1) aktualisOldal--;
        tablaFrissites();
    }
}

function moziModositas(id) {
    const mozi = moziAdatok.find(m => m.id === id);
    const ujNev = prompt("Mozi új neve:", mozi.mozinev);
    
    if (ujNev !== null && ujNev.trim() !== "") {
        mozi.mozinev = ujNev;
        tablaFrissites();
    }
}

// Lapozó vezérlők (marad a régi)
function vezerlokFrissitese() {
    const lapozo = document.getElementById('lapozo-kontener');
    const osszesOldal = Math.ceil(moziAdatok.length / sorOldalankent);
    lapozo.innerHTML = `
        <button onclick="oldalValtas(-1)" ${aktualisOldal === 1 ? 'disabled' : ''}>Előző</button>
        <span> ${aktualisOldal} / ${osszesOldal} </span>
        <button onclick="oldalValtas(1)" ${aktualisOldal === osszesOldal ? 'disabled' : ''}>Következő</button>
    `;
}

function oldalValtas(irany) {
    aktualisOldal += irany;
    tablaFrissites();
}

window.onload = moziBetoltes;
</script>
