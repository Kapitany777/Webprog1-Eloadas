<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Axios CRUD - Mozik</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" type="text/css" href="styles/main.css">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-family: sans-serif; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #2196F3; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .btn-delete { background-color: #f44336; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; }
        .btn-delete:hover { background-color: #d32f2f; }
    </style>
</head>
<body>
    <h1>Mozik kezelése (Axios)</h1>
    
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Mozi Neve</th>
                <th>Művelet</th>
            </tr>
        </thead>
        <tbody id="tabla-test">
            </tbody>
    </table>

    <script>
        const API_URL = 'http://webprogramozas.infinityfreeapp.com/api/mozi_api.php';
        let mozik = [];

        // Adatok betöltése
        function betoltes() {
            axios.get(API_URL)
                .then(res => {
                    mozik = res.data;
                    megjelenites();
                })
                .catch(err => console.error("Hiba a betöltéskor:", err));
        }

        // Táblázat kirajzolása
        function megjelenites() {
            const tbody = document.getElementById('tabla-test');
            if (mozik.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3">Nincs megjeleníthető adat.</td></tr>';
                return;
            }
            tbody.innerHTML = mozik.map(m => `
                <tr>
                    <td>${m.id}</td>
                    <td>${m.mozinev}</td>
                    <td>
                        <button class="btn-delete" onclick="torles(${m.id})">Törlés</button>
                    </td>
                </tr>
            `).join('');
        }

        // Törlés funkció
        function torles(id) {
            if (confirm("Biztosan törlöd ezt a mozit?")) {
                axios.delete(`${API_URL}?id=${id}`)
                    .then(() => {
                        // Frissítjük a helyi listát is
                        mozik = mozik.filter(m => m.id !== id);
                        megjelenites();
                    })
                    .catch(err => {
                        alert("Hiba a törlés során!");
                        console.error(err);
                    });
            }
        }

        // Indítás
        betoltes();
    </script>
</body>
</html>
