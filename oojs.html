<div id="content">
    <h2>OOJS menü</h2>

    <div>
        <div>
            <label>Szélesség:</label>
            <input type="text" id="width" maxlength="4">

            <label>Magasság:</label>
            <input type="text" id="height" maxlength="4">

            <button onclick="resize();">Átméretezés</button>
        </div>

        <div>
            <label>Elforgatás (fok):</label>
            <input type="text" id="angle" maxlength="4">

            <button onclick="rotate();">Elforgatás</button>
        </div>

        <div>
            <label>Keret vastagsága:</label>
            <input type="text" id="borderWidth" maxlength="2">

            <button onclick="setBorderWidth();">Keret</button>
        </div>

        <div>
            <button onclick="image.show();">Megjelenítés</button>
            <button onclick="image.hide();">Elrejtés</button>
        </div>
    </div>

    <script type="text/javascript">
        const div = document.getElementById("content");
        const image = new BorderedImage("images/image1.jpg", div, 272, 484);
    </script>
